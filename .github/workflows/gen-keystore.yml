name: Generate release keystore (one-off)

# Одноразовый бутстрап (2й заход — первый дал пароль с испорченным паддингом,
# похоже echo дописал \n в файл пароля, и он утёк в секрет как часть значения).
# printf вместо echo — без завершающего перевода строки.

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          STORE_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 32)
          KEY_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 32)
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias kartel-display \
            -keyalg RSA -keysize 2048 -validity 10950 \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -dname "CN=KARTEL Display, OU=El Cartel Vape, O=El Cartel Vape, L=Krasnodar, ST=Krasnodar, C=RU"
          printf '%s' "$STORE_PASS" > store_pass.txt
          printf '%s' "$KEY_PASS" > key_pass.txt
          # Самопроверка сразу здесь, тем же JDK — если пароль не читается
          # СЕЙЧАС, лучше упасть в этом workflow, чем узнать об этом в
          # основной сборке через 4 минуты.
          keytool -list -v -keystore release.keystore -alias kartel-display -storepass "$STORE_PASS" -keypass "$KEY_PASS" > /dev/null
          echo "self-check OK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release.keystore
            store_pass.txt
            key_pass.txt
          retention-days: 1
