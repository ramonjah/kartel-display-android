name: Build APK

# Собирает APK клиента KARTEL Display на раннерах GitHub (у них есть Android SDK),
# т.к. локальный Android-тулчейн не всегда доступен. Публикует APK как GitHub Release —
# отсюда его скачивает кнопка «Скачать APK» на экране «Экраны» (rstore-dashboard),
# и отсюда же берёт обновления self-hosted OTA (display_check_update, Этап 10).
#
# Подпись: RELEASE-ключ из секретов репозитория (KARTEL_RELEASE_*), не debug.
# Раньше собирали assembleDebug — каждый прогон на свежем эфемерном раннере
# генерировал СЛУЧАЙНЫЙ debug-ключ (AGP создаёт его сам при отсутствии), и
# Android отказывался ставить обновление поверх APK с другой подписью —
# владелец получал ошибку установки при каждом апдейте. Секреты пишут
# local.properties прямо перед сборкой — тот же путь, что уже поддерживает
# app/build.gradle.kts (hasReleaseSigning), просто теперь заполнен и в CI,
# не только при локальной сборке разработчиком.

on:
  workflow_dispatch:
  push:
    branches: [ main, ci/build-apk ]
    paths-ignore: [ '**.md' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Write release signing config
        env:
          STORE_B64: ${{ secrets.KARTEL_RELEASE_STORE_FILE_B64 }}
          STORE_PASS: ${{ secrets.KARTEL_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KARTEL_RELEASE_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KARTEL_RELEASE_KEY_PASSWORD }}
        run: |
          echo "$STORE_B64" | base64 -d > release.keystore
          cat > local.properties <<EOF
          KARTEL_RELEASE_STORE_FILE=release.keystore
          KARTEL_RELEASE_STORE_PASSWORD=$STORE_PASS
          KARTEL_RELEASE_KEY_ALIAS=$KEY_ALIAS
          KARTEL_RELEASE_KEY_PASSWORD=$KEY_PASS
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Verify signature
        run: |
          BT=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          "$BT/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Stage APK
        id: stage
        run: |
          mkdir -p out
          VN=$(grep -oE 'versionName = "[^"]+"' app/build.gradle.kts | head -1 | cut -d'"' -f2)
          VC=$(grep -oE 'versionCode = [0-9]+' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          cp app/build/outputs/apk/release/app-release.apk "out/kartel-display-v${VN}.apk"
          echo "version_name=$VN" >> "$GITHUB_OUTPUT"
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          echo "apk=out/kartel-display-v${VN}.apk" >> "$GITHUB_OUTPUT"
          ls -lh out/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kartel-display-apk
          path: ${{ steps.stage.outputs.apk }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.stage.outputs.version_name }}
          name: KARTEL Display v${{ steps.stage.outputs.version_name }}
          files: ${{ steps.stage.outputs.apk }}
          body: |
            KARTEL Display — клиент для Android TV (release-signed, постоянный ключ —
            обновления поверх этой и всех последующих сборок ставятся без переустановки).

            Версия: ${{ steps.stage.outputs.version_name }} (code ${{ steps.stage.outputs.version_code }})

            Установка: скачайте .apk → перенесите на телевизор → разрешите «Неизвестные
            источники» для файлового менеджера → установите → запустите KARTEL Display →
            введите 6-значный код в разделе «Экраны» → «Устройство» → «Подтвердить».
