name: Generate release keystore (one-off)

# 3й заход. 1й: echo дописал \n в файл пароля. 2й: РАЗНЫЕ storepass/keypass —
# для PKCS12 (дефолтный формат keytool на современных JDK) это известная
# ловушка: keytool -list может отработать нормально, а логика подписи AGP
# (com.android.ide.common.signing.KeystoreHelper) — упасть с BadPaddingException,
# потому что PKCS12 по спецификации хранит один пароль на весь keystore, и при
# различающихся store/key-паролях разные инструменты трактуют это по-разному.
# Стандартная практика — один и тот же пароль для store и key. Так и делаем.

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 32)
          keytool -genkeypair -v \
            -keystore release.keystore -storetype PKCS12 \
            -alias kartel-display \
            -keyalg RSA -keysize 2048 -validity 10950 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=KARTEL Display, OU=El Cartel Vape, O=El Cartel Vape, L=Krasnodar, ST=Krasnodar, C=RU"
          printf '%s' "$PASS" > store_pass.txt
          printf '%s' "$PASS" > key_pass.txt

          # Самопроверка сразу здесь: (1) keytool -list, как в прошлый раз,
          # (2) СИМУЛЯЦИЯ ТОГО, ЧТО ДЕЛАЕТ AGP — через apksigner/jarsigner
          # реально подписать пустой файл, а не просто прочитать список.
          keytool -list -v -keystore release.keystore -storetype PKCS12 -alias kartel-display -storepass "$PASS" -keypass "$PASS" > /dev/null
          echo "keytool -list OK"
          echo "test" > /tmp/dummy.txt
          jarsigner -verbose -keystore release.keystore -storetype PKCS12 -storepass "$PASS" -keypass "$PASS" -signedjar /tmp/dummy-signed.txt /tmp/dummy.txt kartel-display 2>&1 || true
          # jarsigner needs a jar/zip not a plain text file — реальная проверка ниже через zip.
          zip -q /tmp/dummy.zip /tmp/dummy.txt
          jarsigner -verbose -keystore release.keystore -storetype PKCS12 -storepass "$PASS" -keypass "$PASS" /tmp/dummy.zip kartel-display
          jarsigner -verify /tmp/dummy.zip
          echo "jarsigner sign+verify OK — то же семейство API, что использует AGP при сборке."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release.keystore
            store_pass.txt
            key_pass.txt
          retention-days: 1
