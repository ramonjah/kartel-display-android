name: Generate release keystore (one-off)

# Одноразовый бутстрап: локального JDK/keytool нет, поэтому ключ генерируется
# здесь и уходит артефактом (не в логи, не в git) — дальше он идёт в секреты
# репозитория и файл workflow удаляется. Причина: CI-сборки APK шли debug-
# подписью, каждый прогон на свежем раннере получал СЛУЧАЙНЫЙ debug-ключ →
# обновление поверх уже установленного APK с другой подписью Android
# отклоняет (иногда с невнятной «ошибкой парсинга пакета»).

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          STORE_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 32)
          KEY_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 32)
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias kartel-display \
            -keyalg RSA -keysize 2048 -validity 10950 \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -dname "CN=KARTEL Display, OU=El Cartel Vape, O=El Cartel Vape, L=Krasnodar, ST=Krasnodar, C=RU"
          echo "$STORE_PASS" > store_pass.txt
          echo "$KEY_PASS" > key_pass.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release.keystore
            store_pass.txt
            key_pass.txt
          retention-days: 1
